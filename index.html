<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova | Premium Sports Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .nav-icon { font-size: 20px; color: #fff; }
        .category-card { background: #1a2236; border-radius: 12px; overflow: hidden; position: relative; border-bottom: 3px solid #3b82f6; }
        .feature-box { background: #161e2e; border: 1px solid #2d3748; padding: 10px; border-radius: 8px; text-align: center; }
        .feature-box i { color: #3b82f6; font-size: 18px; margin-bottom: 5px; }
        .feature-box p { font-size: 8px; text-transform: uppercase; color: #94a3b8; line-height: 1.2; }
        .bottom-nav { background: #0f172a; border-top: 1px solid #1e293b; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 10px; }
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 2px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header Section -->
    <header class="flex items-center justify-between px-5 py-4 bg-[#0b1120] sticky top-0 z-50">
        <i class="fas fa-bars nav-icon"></i>
        <div class="text-2xl font-bold text-blue-500 brand-font">JERSEY NOVA</div>
        <div class="flex space-x-4">
            <i class="far fa-sun nav-icon"></i>
            <i class="far fa-user nav-icon"></i>
        </div>
    </header>

    <!-- Main Banner / Slider Section -->
    <section class="px-2 mt-2">
        <div class="relative rounded-xl overflow-hidden shadow-2xl">
            <!-- আপনি আপনার banners ফোল্ডারে 'hero-banner.jpg' নামে ছবি রাখলে এখানে দেখাবে -->
            <img src="images/banner1.jpg" class="w-full h-auto object-cover" alt="Main Banner">
            <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2">
                <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                <span class="w-6 h-2 bg-blue-500 rounded-full"></span>
            </div>
        </div>
    </section>

    <!-- Shipping & Policy Section -->
    <section class="grid grid-cols-4 gap-2 px-3 mt-5">
        <div class="feature-box">
            <i class="fas fa-truck"></i>
            <p>FASTEST SHIPPING <br>COUNTRYWIDE</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-undo"></i>
            <p>EASY RETURN <br>POLICY</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-ribbon"></i>
            <p>PREMIUM QUALITY <br>PRODUCT</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-headset"></i>
            <p>ONLINE SUPPORT <br>24/7</p>
        </div>
    </section>

    <!-- Categories Section Header -->
    <div class="text-center mt-10">
        <h2 class="text-lg font-bold tracking-widest uppercase">Categories</h2>
        <div class="w-16 h-1 bg-blue-500 mx-auto mt-1"></div>
    </div>

    <!-- Category Grid Section -->
    <section class="grid grid-cols-2 gap-4 px-4 mt-6">
        <!-- IPL Category -->
        <div class="category-card">
            <img src="images/ipl-cat.jpg" class="w-full h-48 object-cover opacity-80" alt="IPL">
            <div class="p-3 text-center bg-[#1e293b]">
                <p class="text-xs font-bold uppercase">IPL 2024</p>
            </div>
        </div>
        <!-- PSL Category -->
        <div class="category-card">
            <img src="images/psl-cat.jpg" class="w-full h-48 object-cover opacity-80" alt="PSL">
            <div class="p-3 text-center bg-[#1e293b]">
                <p class="text-xs font-bold uppercase">PSL 2024</p>
            </div>
        </div>
    </section>

    <!-- Secondary Banner Section -->
    <section class="px-4 mt-8">
        <div class="rounded-xl overflow-hidden border border-blue-500/30">
            <img src="images/promo-banner.jpg" class="w-full" alt="Promo">
        </div>
    </section>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i>
            Home
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-th-large"></i>
            Category
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-search"></i>
            Search
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-shopping-cart"></i>
            Cart
        </a>
        <a href="#" class="nav-item">
            <i class="far fa-heart"></i>
            Wishlist
        </a>
    </nav>

</body>
</html>
