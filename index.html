<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jersey Nova | Premium Sports Shop</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    background-color: #0b1120;
    color: #fff;
    font-family: 'Inter', sans-serif;
    padding-bottom: 70px;
}

.brand-font {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
}

.nav-icon {
    font-size: 20px;
    color: #fff;
}

.category-card {
    background: #1a2236;
    border-radius: 12px;
    overflow: hidden;
    border-bottom: 3px solid #3b82f6;
    cursor: pointer;
}

.feature-box {
    background: #161e2e;
    border: 1px solid #2d3748;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.feature-box i {
    color: #3b82f6;
    font-size: 18px;
}

.feature-box p {
    font-size: 8px;
    text-transform: uppercase;
    color: #94a3b8;
}

.bottom-nav {
    background: #0f172a;
    border-top: 1px solid #1e293b;
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav-item {
    text-align: center;
    color: #94a3b8;
    font-size: 10px;
}

.nav-item.active {
    color: #3b82f6;
}

.nav-item i {
    font-size: 18px;
    display: block;
}
</style>
</head>

<body>

<header class="flex items-center justify-between px-5 py-4 bg-[#0b1120] sticky top-0">
<i class="fas fa-bars nav-icon"></i>

<div class="text-2xl font-bold text-blue-500 brand-font">
JERSEY NOVA
</div>

<div class="flex space-x-4">
<i class="far fa-user nav-icon"></i>
</div>
</header>

<!-- Banner -->

<section class="px-2 mt-2">
<img src="images/banner1.jpg"
class="w-full rounded-xl">
</section>

<!-- Features -->

<section class="grid grid-cols-4 gap-2 px-3 mt-5">

<div class="feature-box">
<i class="fas fa-truck"></i>
<p>FAST SHIPPING</p>
</div>

<div class="feature-box">
<i class="fas fa-undo"></i>
<p>EASY RETURN</p>
</div>

<div class="feature-box">
<i class="fas fa-ribbon"></i>
<p>PREMIUM</p>
</div>

<div class="feature-box">
<i class="fas fa-headset"></i>
<p>SUPPORT</p>
</div>

</section>

<!-- Categories -->

<div class="text-center mt-10">
<h2 class="text-lg font-bold uppercase">
Categories
</h2>
</div>

<section class="grid grid-cols-2 gap-4 px-4 mt-6">

<div class="category-card"
onclick="openCategory('IPL')">

<img src="images/ipl-cat.jpg"
class="w-full h-48 object-cover">

<div class="p-3 text-center bg-[#1e293b]">
IPL 2024
</div>

</div>

<div class="category-card"
onclick="openCategory('PSL')">

<img src="images/psl-cat.jpg"
class="w-full h-48 object-cover">

<div class="p-3 text-center bg-[#1e293b]">
PSL 2024
</div>

</div>

</section>

<!-- Bottom Nav -->

<nav class="bottom-nav">

<div class="nav-item active"
onclick="goPage('home')">

<i class="fas fa-home"></i>
Home

</div>

<div class="nav-item"
onclick="goPage('category')">

<i class="fas fa-th-large"></i>
Category

</div>

<div class="nav-item"
onclick="goPage('search')">

<i class="fas fa-search"></i>
Search

</div>

<div class="nav-item"
onclick="goPage('cart')">

<i class="fas fa-shopping-cart"></i>
Cart

</div>

<div class="nav-item"
onclick="goPage('wishlist')">

<i class="far fa-heart"></i>
Wishlist

</div>

</nav>

<script>

function openCategory(name) {
    alert(name + " Category Open");
}

function goPage(page) {
    alert("Opening " + page);
}

</script>

</body>
</html>
